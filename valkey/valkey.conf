port 6379
bind 0.0.0.0
protected-mode no

# Cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000

# Auth
requirepass foobared
masterauth foobared

# Memory (container limit is 64M; leave headroom for overhead/buffers)
maxmemory 40mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfilename "appendonly.aof"
dir /data
